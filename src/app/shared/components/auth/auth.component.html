<div class="main-auth">
    <div class="card" style="width: 350px;">
        <div class="card-body">
            <ng-container *ngIf="isAllreadyHasAccount">
                <form [formGroup]="LoginForm" (ngSubmit)="onlogin()">
                    <div class="form-group">
                        <label for="email" class="text-primary">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="l['email'].touched && l['email'].hasError('requried')">Email Is Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password" class="text-primary">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="l['password'].touched && l['password'].hasError('requried')">Password Is Requried
                            Field...</small>
                    </div>
                    <button mat-raised-button color="primary" class="w-100 mb-2">Log In</button>
                    <a (click)="isAllreadyHasAccount =false" href="javascript:;">Don't Have Account</a>
                </form>
            </ng-container>
            <ng-container *ngIf="!isAllreadyHasAccount">
                <form [formGroup]="SignUpForm" (ngSubmit)="onsignup()">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="s['email'].touched && s['email'].hasError('requried')">Email Is Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="s['password'].touched && s['password'].hasError('requried')">Password Is Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="userRole">User Role*</label>
                        <select type="text" formControlName="userRole" class="form-control">
                            <option value="buyer">Buyer</option>
                            <option value="admin">Admin</option>
                            <option value="superAdmin">SuperAdmin</option>
                        </select>
                        <small *ngIf="s['userRole'].touched && s['userRole'].hasError('requried')">UserRole IS Requried
                            Field...</small>
                    </div>
                    <button mat-raised-button color="primary" class="w-100 mb-2">Sing Up</button>
                    <a (click)="isAllreadyHasAccount = true" href="javascript:;">Already Has A Account</a>
                </form>
            </ng-container>
        </div>

    </div>
</div>
