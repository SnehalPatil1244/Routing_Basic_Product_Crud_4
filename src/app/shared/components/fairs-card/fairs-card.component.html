<div [routerLink]="fairObj.fairId" routerLinkActive="active" class="card mb-4 fairCard">
    <div class="card-body">
        <h1 class="m-0">{{fairObj.fairName}}</h1>
        <div class="TypeAndDate bg-white p-3">
            <p class="m-0">
                Event Type : {{fairObj.type}}
            </p>
            <p class="m-0">
                Date : {{(fairObj.startDate * 1000) | date}}
            </p>
        </div>
    </div>
</div>
