<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body">
                <h3 class="text-center p-3 bg-primary">{{isInEditMode ? 'Update Product' : 'Add Product'}}</h3>
                <form [formGroup]="productForm" (ngSubmit)="onproductsubmit()">
                    <div class="form-group">
                        <label for="Name">Name</label>
                        <input type="text" formControlName="pname" class="form-control">
                        <small *ngIf="productForm.get('pname')?.touched && productForm.get('pname')?.invalid">Name Is
                            Requried</small>
                    </div>

                    <div class="form-group">
                        <label for="Name">Price</label>
                        <input type="text" formControlName="pprice" class="form-control">
                        <small *ngIf="productForm.get('pprice')?.touched && productForm.get('pprice')?.invalid">Price Is
                            Requried</small>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select formControlName="pstatus" type="text" class="form-control" id="pstatus">
                            <option value="In-Progress">In-Progress</option>
                            <option value="Dispatched">Dispatched</option>
                            <option value="Delivered">Delivered</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Description">Description</label>
                        <textarea type="text" formControlName="pdescription" class="form-control"></textarea>
                        <small
                            *ngIf="productForm.get('pdescription')?.touched && productForm.get('pdescription')?.invalid">description
                            Is
                            Requried</small>
                    </div>

                    <div class="form-group">
                        <label for="pimage">Image</label>
                        <textarea type="text" formControlName="pimage" class="form-control"></textarea>
                        <small *ngIf="productForm.get('pimage')?.touched && productForm.get('pimage')?.invalid">image
                            Is Requried</small>
                    </div>
                    <div class="form-group">
                        <label for="canReturn">Can Return</label>
                        <select formControlName="canReturn" type="text" class="form-control" id="canReturn">
                            <option [ngValue]="1">Yes</option>
                            <option [ngValue]="0">No</option>

                        </select>
                    </div>
                     <button *ngIf="!isInEditMode" type="submit" class="btn btn-sm btn-outline-primary w-100">Add
                        Product</button>
                    <button *ngIf="isInEditMode" type="button" (click)="onUpdatepro()" [disabled]="DisableUpdatebtn"
                        class="btn btn-sm btn-outline-primary w-100">Update Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
